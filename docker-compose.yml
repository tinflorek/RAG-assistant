services:
  ollama:
    image: ollama/ollama
    ports: ["11434:11434"]   # ← tu zostawiasz, bo chcesz odpytywać Ollama z hosta (CLI, curl)
    volumes: ["ollama_data:/root/.ollama"]

  # Jednorazowy kontener: czeka aż serwer Ollama wstanie i pobiera modele,
  # żeby samo `docker compose up` wystarczyło (bez ręcznego `ollama pull`).
  # Modele lądują we wspólnym wolumenie ollama_data, więc kolejne starty są szybkie.
  ollama-init:
    image: ollama/ollama
    depends_on: [ollama]
    environment:
      OLLAMA_HOST: ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "until ollama ps >/dev/null 2>&1; do echo 'waiting for ollama...'; sleep 1; done;
       ollama pull nomic-embed-text &&
       ollama pull qwen2.5:3b"
    restart: "no"

  chromadb:
    image: chromadb/chroma:0.6.3   # ← pin do wersji klienta (chromadb==0.6.3), inaczej KeyError: '_type'
    user: root
    # brak ports — Chroma dostępna tylko wewnątrz sieci compose jako http://chromadb:8000
    # UWAGA: obraz 0.6.3 zapisuje do /chroma/chroma (nie /data jak :latest) — wolumen musi pasować
    volumes: ["chroma_data:/chroma/chroma"]
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"

  rag-api:
    build: .
    ports: ["8080:8000"]     # ← host 8080 → kontener 8000 (uvicorn); eksponujesz tylko API
    # rag-api startuje dopiero gdy modele są pobrane → pierwsze /ingest i /query nie zwrócą 500
    depends_on:
      chromadb:
        condition: service_started
      ollama-init:
        condition: service_completed_successfully
    volumes: ["./docs:/app/docs"]
    environment:
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      OLLAMA_HOST: ollama
      OLLAMA_PORT: 11434

volumes:
  ollama_data:
  chroma_data: